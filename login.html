<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <link rel="shortcut icon" href="assets/icone/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="login.css">
    <title>Login | Webmail</title>
</head>

<body>


    <div id="auth-container">
        <div class="login" id="login-form">
            <img src="./assets/image/SEO2.webp" alt="Image poste de travail" class="login__img">

            <form action="" class="login__form">
                <h1 class="login__title">Login</h1>

                <div class="login__content">
                    <div class="login__box">
                        <i class="ri-user-3-line login__icon"></i>

                        <div class="login__box-input">
                            <input type="email" required class="login__input" id="login-email" placeholder=" ">
                            <label for="login-email" class="login__label">Email</label>
                        </div>
                    </div>

                    <div class="login__box">
                        <i class="bx bx-lock-alt login__icon"></i>

                        <div class="login__box-input">
                            <input type="password" required class="login__input" id="login-pass" placeholder=" ">
                            <label for="login-pass" class="login__label">Mot de passe</label>
                            <i class="bx bx-hide login__eye" id="login-eye"></i>
                        </div>
                    </div>
                </div>

                <div class="login__check">
                    <div class="login__check-group">
                        <input type="checkbox" class="login__check-input" id="login-remember">
                        <label for="login-remember" class="login__check-label">se souvenir</label>
                    </div>

                    <a href="#" class="login__forgot">Mot de passe oublié?</a>
                </div>

                <button class="login__button">Login</button>

                <p>
                    Vous n’avez pas de compte?
                </p>
                <div class="login__register">
                    <a href="#" id="show-register">S'inscrire</a>
                </div>

            </form>
        </div>

        <div class="register hidden" id="register-form">
            <img src="./assets/image/SEO2.webp" alt="Image poste de travail" class="register__img">

            <form action="" class="register__form">
                <h1 class="register__title">S'inscrire</h1>

                <div class="register__content">

                    <div class="register__box">
                        <i class="ri-user-line register__icon"></i>
                        <div class="register__box-input">
                            <input type="text" required class="register__input" id="register-firstname" placeholder=" ">
                            <label for="register-firstname" class="register__label">Prénom</label>
                        </div>
                    </div>

                    <!-- Nom -->
                    <div class="register__box">
                        <i class="ri-user-line register__icon"></i>
                        <div class="register__box-input">
                            <input type="text" required class="register__input" id="register-lastname" placeholder=" ">
                            <label for="register-lastname" class="register__label">Nom</label>
                        </div>
                    </div>

                    <!-- Email (existant) -->
                    <div class="register__box">
                        <i class="ri-mail-line register__icon"></i>
                        <div class="register__box-input">
                            <input type="email" required class="register__input" id="register-email" placeholder=" ">
                            <label for="register-email" class="register__label">Email</label>
                        </div>
                    </div>

                    <!-- Photo de profil -->
                    <div class="register__box">
                        <i class="ri-image-line register__icon"></i>
                        <div class="register__box-input">
                            <input type="file" accept="image/*" class="register__input" id="register-photo">
                            <label for="register-photo" class="register__label">Photo de profil</label>
                        </div>
                    </div>

                    <!-- Mot de passe (existant) -->
                    <div class="register__box">
                        <i class="bx bx-lock-alt register__icon"></i>
                        <div class="register__box-input">
                            <input type="password" required class="register__input" id="register-pass" placeholder=" ">
                            <label for="register-pass" class="register__label">Mot de passe</label>
                            <i class="bx bx-hide register__eye" id="register-eye"></i>
                        </div>
                    </div>
                </div>

                <button type="submit" class="register__button">S'inscrire</button>

                <div class="register__login">
                    <span>Déjà inscrit ? </span>
                    <a href="#" id="show-login">Se connecter</a>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/login.js"></script>
</body>

</html>
